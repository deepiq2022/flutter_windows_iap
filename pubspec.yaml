name: flutter_windows_iap
description: "Flutter plugin for Microsoft Store in-app purchases on Windows, wrapping Windows.Services.Store.StoreContext via C++/WinRT."
version: 0.1.0
homepage: https://github.com/deepiq2022/flutter_windows_iap
repository: https://github.com/deepiq2022/flutter_windows_iap
issue_tracker: https://github.com/deepiq2022/flutter_windows_iap/issues
topics:
  - iap
  - windows
  - store
  - in-app-purchase

environment:
  sdk: ^3.10.0
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      windows:
        pluginClass: FlutterWindowsIapPluginCApi
